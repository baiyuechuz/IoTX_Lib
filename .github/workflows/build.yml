name: Build Examples

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        example:
          - examples/basic_sensor/basic_sensor.ino
          - examples/full_dashboard/full_dashboard.ino

    steps:
      - uses: actions/checkout@v4

      - uses: arduino/compile-sketches@v1
        with:
          fqbn: esp32:esp32:esp32
          sketch-paths: ${{ matrix.example }}
          platforms: |
            - name: esp32:esp32
              source-url: https://espressif.github.io/arduino-esp32/package_esp32_index.json
          libraries: |
            - source-path: ./
            - name: DHT sensor library
            - name: Firebase ESP32 Client
          cli-compile-flags: |
            - --warnings=default
